name: uaspemmob
description: "Sobat Beres - Aplikasi Marketplace Jasa"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4

  # State Management
  provider: ^6.1.2

  # UI & Fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1

  # Utils
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
